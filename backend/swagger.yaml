        - BearerAuth: []
      tags:
        - Complaints
      summary: Delete Complaint Ticket
      description: Deletes a logged resident complaint ticket by ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Database ID of the complaint ticket
          schema:
            type: integer
            example: 12
      responses:
        200:
          description: Complaint ticket removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/committee:
    get:
      security:
        - BearerAuth: []
      tags:
        - Committee
      summary: Get Society Committee Members
      description: Returns all committee members for a given society.
      parameters:
        - name: society_name
          in: query
          required: true
          description: Name of the housing society
          schema:
            type: string
            example: "Greenwood Residency"
        - name: property_type
          in: query
          required: false
          description: Property type of the society (flat or bungalow)
          schema:
            type: string
            enum: [flat, bungalow]
            default: flat
            example: "flat"
      responses:
        200:
          description: A list of committee members
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  committee:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        society_id:
                          type: integer
                        name:
                          type: string
                        role:
                          type: string
                        phone:
                          type: string
        400:
          description: Missing required query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Society not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Server or database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      security:
        - BearerAuth: []
      tags:
        - Committee
      summary: Add / Update Committee Member
      description: Configures managing committee rosters (roles, mobile numbers) for society administration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitteeRequest'
      responses:
        200:
          description: Managing member added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/committee/{id}:
    delete:
      security:
        - BearerAuth: []
      tags:
        - Committee
      summary: Remove Committee Member
      description: Deletes a committee member registry entry from the society's users list.
      parameters:
        - name: id
          in: path
          required: true
          description: Database ID of the committee user
          schema:
            type: integer
            example: 10
      responses:
        200:
          description: Managing member removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/bank:
    post:
      security:
        - BearerAuth: []
      tags:
        - Bank & Settings
      summary: Save Bank Details
      description: Saves or updates the society's official bank account details and QR code image for payment processing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankRequest'
      responses:
        200:
          description: Banking information updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/whatsapp-blast:
    post:
      security:
        - BearerAuth: []
      tags:
        - Bank & Settings
      summary: Send SMS / WhatsApp Broadcast Reminders
      description: Triggers a bulk notification campaign via Twilio. Reverts to SMS delivery if the WhatsApp pipeline fails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhatsappBlastRequest'
      responses:
        200:
          description: Campaign finished processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/update-due-day:
    post:
      security:
        - BearerAuth: []
      tags:
        - Bank & Settings
      summary: Configure Invoice Due Day
